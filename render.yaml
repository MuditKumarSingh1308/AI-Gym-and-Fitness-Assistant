services:
  - type: web
    name: ai-gym-backend
    env: python
    rootDir: fastapi-backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: AI Gym Fitness Assistant API
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "14"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: ai_gym_fitness
      - key: BACKEND_CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app,http://localhost:3000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_TEMPERATURE
        value: "0.6"
      - key: NEARBY_GYM_PROVIDER
        value: mock
      - key: STORAGE_PROVIDER
        value: firebase
      - key: STORAGE_BUCKET
        value: ai-gym-fitness-media
      - key: STORAGE_REGION
        value: us-central1
